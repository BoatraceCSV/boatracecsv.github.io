name: Preview Realtime

# NOTE: The 5-minute schedule has been migrated to Cloud Scheduler +
# Cloud Run Jobs (project: boatrace-487212, region: asia-northeast1) because
# GitHub Actions schedule triggers are heavily throttled and effectively
# fire only ~hourly. See infra/README.md for the GCP setup.
#
# This workflow is retained as a manual fallback only. Trigger via the
# GitHub UI ("Run workflow") if Cloud Run is down or you need to reprocess
# a specific date.
on:
  workflow_dispatch:
    inputs:
      date:
        description: 'Date override (YYYY-MM-DD). Default: today (JST).'
        required: false
        default: ''
      now:
        description: 'Reference time override (HH:MM JST). Default: now.'
        required: false
        default: ''
      dry_run:
        description: 'Plan only, do not write or commit.'
        required: false
        default: false
        type: boolean

# Prevent overlapping runs from racing on the same CSVs / git push.
concurrency:
  group: preview-realtime
  cancel-in-progress: false

env:
  PYTHONUNBUFFERED: 1
  LOG_LEVEL: INFO

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: pip install -r scripts/requirements.txt

      - name: Configure Git
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git config --global url."https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Run preview-realtime
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.date }}" ]; then
            ARGS="$ARGS --date ${{ github.event.inputs.date }}"
          fi
          if [ -n "${{ github.event.inputs.now }}" ]; then
            ARGS="$ARGS --now ${{ github.event.inputs.now }}"
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          python scripts/preview-realtime.py $ARGS

      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: preview-realtime-logs-${{ github.run_id }}
          path: logs/
          retention-days: 7
          if-no-files-found: ignore
