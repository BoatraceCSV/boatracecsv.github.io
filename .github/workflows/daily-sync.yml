name: Daily Boatrace Data Sync

on:
  schedule:
    # Every day at 22:30 UTC = 07:30 JST (next day)
    # Cloud Run Job 側の preview-realtime (JST 08:00-22:59, 5 分毎) が
    # 当日 title CSV / race_cards / recent_form / motor_stats を参照する前に
    # daily-sync を完走させたい。実測で 1 ランあたり ~22 分かかるため、
    # preview-realtime の初回発火 (JST 08:00) に対して 30 分の余裕を取り
    # JST 07:30 起動とする。これで通常は 07:52 頃に完了し、08:00 の
    # 初回サイクルから当日 title CSV を利用できる。
    - cron: '30 22 * * *'
  workflow_dispatch:
    inputs:
      start_date:
        description: 'Start date (YYYY-MM-DD)'
        required: false
        default: ''
      end_date:
        description: 'End date (YYYY-MM-DD)'
        required: false
        default: ''
      force_overwrite:
        description: 'Force overwrite existing files'
        required: false
        default: false
        type: boolean

env:
  PYTHONUNBUFFERED: 1
  LOG_LEVEL: INFO

jobs:
  fetch-and-convert:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Pull LFS Files
        run: |
          git lfs pull

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          pip install -r scripts/requirements.txt

      - name: Configure Git
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          # Configure git to use token for https authentication
          git config --global url."https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Process Results (K-file)
        run: |
          python scripts/result.py --force
        if: always()

      - name: Process Programs (B-file)
        run: |
          python scripts/program.py --force
        if: always()

      - name: Process Race Cards (boatcast bc_j_str3)
        # 当日分の race_cards を取得する。boatcast.jp の bc_j_str3 は
        # 当日早朝には当日レース分が揃うため、07:30 JST 起動の
        # 本ワークフローでは --date を当日 (TODAY_JST) に明示する。
        # boatcast 側の更新が間に合わないケースは continue-on-error で
        # ワークフロー全体を止めずに次回 (翌日 07:30) で再試行する。
        run: |
          TODAY_JST=$(TZ=Asia/Tokyo date +%Y-%m-%d)
          python scripts/race-card.py --date "$TODAY_JST" --force
        if: always()
        continue-on-error: true

      - name: Process Recent Form (boatcast bc_zensou + bc_zensou_touchi)
        # 当日分の recent_form を取得する。
        run: |
          TODAY_JST=$(TZ=Asia/Tokyo date +%Y-%m-%d)
          python scripts/recent-form.py --date "$TODAY_JST" --force
        if: always()
        continue-on-error: true

      - name: Process Motor Stats (boatcast bc_mst + bc_mdc)
        # 当日分の motor_stats を取得する。
        run: |
          TODAY_JST=$(TZ=Asia/Tokyo date +%Y-%m-%d)
          python scripts/motor-stats.py --date "$TODAY_JST" --force
        if: always()
        continue-on-error: true

      - name: Process Race Titles (boatcast getHoldingList2)
        # 当日分の per-race タイトル(レース名) を取得する。
        # data/programs/title/YYYY/MM/DD.csv に書き出す。
        # race_cards / recent_local / motor_stats には レース名 が無いため、
        # レースコード をキーに join できる sidecar として保持する。
        run: |
          TODAY_JST=$(TZ=Asia/Tokyo date +%Y-%m-%d)
          python scripts/race-title.py --date "$TODAY_JST" --force
        if: always()
        continue-on-error: true

      - name: Build Daily Index Batch (枠番・選手・モーター + 暫定強さpt)
        # 当日 JST のレース全件分について、枠番・選手・モーター・暫定強さpt
        # を埋めた data/estimate/index/YYYY/MM/DD.csv を生成する。展示・気象は 50 で
        # 補完(状態=daily)。直前バッチ(preview-realtime.yml)が稼働開始する
        # 朝までに完了させる必要があるため、データ取得ステップの直後に置く。
        run: |
          TODAY_JST=$(TZ=Asia/Tokyo date +%Y-%m-%d)
          echo "Building daily index for $TODAY_JST"
          python scripts/build_index.py --date "$TODAY_JST" --mode daily
        if: always()
        continue-on-error: true

      - name: Commit Daily Index
        run: |
          git add data/estimate/index/
          if git diff --cached --quiet; then
            echo "No daily index changes to commit"
          else
            TODAY_JST=$(TZ=Asia/Tokyo date +%Y-%m-%d)
            git commit -m "Update daily index batch ($TODAY_JST)"
            git push
          fi
        if: always()
        continue-on-error: true

      - name: Check Job Status
        if: always()
        run: |
          if [ ${{ job.status }} = "success" ]; then
            echo "WORKFLOW_STATUS=SUCCESS" >> $GITHUB_ENV
          else
            echo "WORKFLOW_STATUS=FAILURE" >> $GITHUB_ENV
          fi

      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: boatrace-logs-${{ github.run_id }}
          path: logs/
          retention-days: 30
          if-no-files-found: ignore
