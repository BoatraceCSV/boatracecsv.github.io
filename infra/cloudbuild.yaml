# Cloud Build pipeline for the preview-realtime container.
#
# - Builds infra/Dockerfile against the repo root.
# - Tags the image with both :latest and :$SHORT_SHA in Artifact Registry.
# - Creates or updates the Cloud Run Job (`gcloud run jobs deploy` is
#   create-or-update), so the first run bootstraps the Job and subsequent
#   runs roll out a new image revision. The Job spec lives here, making
#   this file the single source of truth.
#
# Manual run:
#   gcloud builds submit \
#     --config infra/cloudbuild.yaml \
#     --substitutions=SHORT_SHA=$(git rev-parse --short HEAD) \
#     --project boatrace-487212
#
# Recommended trigger: GitHub push to main with included files
#   infra/**, scripts/requirements.txt, scripts/**

substitutions:
  _REGION: asia-northeast1
  _AR_REPO: containers
  _IMAGE: preview-realtime
  _JOB_NAME: preview-realtime
  _PROJECT_ID: boatrace-487212
  _RUNNER_SA: preview-realtime-runner
  _SECRET_NAME: github-token
  _GITHUB_REPO: BoatraceCSV/boatracecsv.github.io
  _GIT_BRANCH: main

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

images:
  - '${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_AR_REPO}/${_IMAGE}:${SHORT_SHA}'
  - '${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_AR_REPO}/${_IMAGE}:latest'

steps:
  - id: build
    name: gcr.io/cloud-builders/docker
    # BuildKit is required for `COPY --chmod=...` in infra/Dockerfile.
    env:
      - DOCKER_BUILDKIT=1
    args:
      - build
      - --file=infra/Dockerfile
      - --tag=${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_AR_REPO}/${_IMAGE}:${SHORT_SHA}
      - --tag=${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_AR_REPO}/${_IMAGE}:latest
      - --cache-from=${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_AR_REPO}/${_IMAGE}:latest
      - .

  - id: push-sha
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_AR_REPO}/${_IMAGE}:${SHORT_SHA}

  - id: push-latest
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_AR_REPO}/${_IMAGE}:latest

  # Create-or-update the Cloud Run Job. `deploy` is idempotent: it creates
  # the Job on first run and updates the existing Job on subsequent runs.
  # Cloud Build needs roles/run.developer on the project AND
  # iam.serviceAccountUser on the runner SA — see infra/README.md §5.
  - id: deploy-job
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - jobs
      - deploy
      - ${_JOB_NAME}
      - --image=${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_AR_REPO}/${_IMAGE}:${SHORT_SHA}
      - --region=${_REGION}
      - --project=${_PROJECT_ID}
      - --service-account=${_RUNNER_SA}@${_PROJECT_ID}.iam.gserviceaccount.com
      - --set-secrets=GITHUB_TOKEN=${_SECRET_NAME}:latest
      - --set-env-vars=GITHUB_REPO=${_GITHUB_REPO},GIT_BRANCH=${_GIT_BRANCH}
      - --max-retries=0
      - --task-timeout=300s
      - --parallelism=1
      - --tasks=1
      - --cpu=1
      # 1Gi is well over the working set for a partial+sparse clone (~tens of
      # MB), but provides headroom for git's transient packfile work and the
      # python pandas/lightgbm import footprint.
      - --memory=1Gi

timeout: 1200s
